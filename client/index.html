<!DOCTYPE html>
<html lang='fr'>
<head>
    <meta charset='utf-8'>
    <title>Liars !</title>
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <style >
        .up-top {
            padding-left: 15px;
            margin: 5px;
        }
        .left-right {
            display:inline-block;
            margin: 5px;
        }
    </style>
</head>

<body onload="load()">

<div id="startPanel">
    <label for="name">Nom:</label><input id="name" value=""> <label for="code">Code d'accès:</label><input id="code" value="">
    <button onclick="iAm('player')">Jouer !</button>
    <button onclick="iAm('presenter')">Device de présentation</button>
</div>

<div id="codePanel" style="display:none">
    Code: <h1 id="codeText"></h1>

    <div id="playersContainer"></div>
    <button onclick="start()">Commencer !</button>
</div>

<div id="waitPanel" style="display:none">
    <h1>Regardez la présentation</h1>
</div>

<div id="controllerPanel">
    <div id="move" style="display:inline-block;width: 48%">
        <div id="move3" class="up-top"><i class="fa fa-arrow-up" aria-hidden="true"></i></div>
        <div>
            <div id="move2" class="left-right"><i class="fa fa-arrow-left" aria-hidden="true"></i></div>
            <div id="move0" class="left-right"><i class="fa fa-arrow-right" aria-hidden="true"></i></div>
        </div>
        <div id="move1" class="up-top"><i class="fa fa-arrow-down" aria-hidden="true"></i></div>
    </div>
    <div id="place" style="display:inline-block;width: 48%">
        <div id="place3" class="up-top"><i class="fa fa-arrow-circle-o-up" aria-hidden="true"></i></div>
        <div>
            <div id="place2" class="left-right"><i class="fa fa-arrow-circle-o-left" aria-hidden="true"></i></div>
            <div id="place0" class="left-right"><i class="fa fa-arrow-circle-o-right" aria-hidden="true"></i></div>
        </div>
        <div id="place1" class="up-top"><i class="fa fa-arrow-circle-o-down" aria-hidden="true"></i></div>
    </div>
</div>

<div id="cardPanel">
    <div id="type"></div>
    <canvas style="width: 500px; height: 500px" id="card" style="border:1px solid black"></canvas>
</div>

<script src="socket.io/socket.io.js"></script>
<script type="text/javascript" src="./js/player.js"></script>
<script type="text/javascript" src="./js/presenter.js"></script>
<script type="text/javascript" src="./js/client.js"></script>
</body>

</html>
